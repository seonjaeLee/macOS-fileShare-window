<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<title>IPC 연결 테스트 (임시 - 3단계에서 실제 UI로 교체 예정)</title>
</head>
<body style="font-family: sans-serif; padding: 20px;">
  <h3>2단계 임시 테스트 화면</h3>
  <p>실제 드래그드롭 다크모드 UI는 3단계에서 만듭니다. 지금은 IPC가 맥/렌더러 사이에서
     정상 왕복하는지만 확인합니다.</p>
  <p>
    <input id="pathInput" type="text" size="60" placeholder="정규화할 파일/폴더의 절대 경로 입력" />
    <button id="runBtn">normalize-paths 호출</button>
  </p>
  <pre id="result" style="background:#eee; padding:10px; white-space: pre-wrap;"></pre>

  <script>
    const btn = document.getElementById('runBtn');
    const input = document.getElementById('pathInput');
    const result = document.getElementById('result');

    btn.addEventListener('click', async () => {
      const p = input.value.trim();
      if (!p) return;
      result.textContent = '처리 중...';
      try {
        const res = await window.api.normalizePaths([p]);
        result.textContent = JSON.stringify(res, null, 2);
      } catch (err) {
        result.textContent = '에러: ' + err.message;
      }
    });
  </script>
</body>
</html>
