<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<title>한글 파일명 정리</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1>한글 파일명 정리</h1>
    <p class="desc">macOS에서 만든 한글 파일명이 윈도우에서 깨지지 않도록 정리합니다.</p>

    <div id="dropzone" class="dropzone">
      <p>여기로 파일 또는 폴더를 드래그하세요</p>
    </div>

    <ul id="fileList" class="file-list"></ul>

    <div class="actions">
      <button id="normalizeBtn" disabled>파일명만 정리하기</button>
      <button id="zipBtn" disabled title="4단계에서 추가될 기능입니다">정리해서 압축하기</button>
    </div>

    <pre id="status" class="status"></pre>
  </div>
  <script src="renderer.js"></script>
</body>
</html>
